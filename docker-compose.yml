services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./services/spark/jobs:/app/jobs:ro
      - ./services/shared:/app/services/shared:ro
    depends_on:
      - qdrant
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    environment:
      - API_BASE_URL=http://api:8000
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    depends_on:
      - api

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage

  sglang:
    image: lmsysorg/sglang:latest
    profiles:
      - llm
    environment:
      - HF_HOME=/root/.cache/huggingface
    ports:
      - "${SGLANG_PORT:-30000}:30000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ipc: host
    command:
      - python3
      - -m
      - sglang.launch_server
      - --model-path
      - ${SGLANG_MODEL:-Qwen/Qwen3.6-35B-A3B}
      - --host
      - 0.0.0.0
      - --port
      - "30000"
      - --context-length
      - "${SGLANG_CONTEXT_LENGTH:-8192}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

